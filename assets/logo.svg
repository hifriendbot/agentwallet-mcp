<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="48" ry="48" fill="url(#bg)"/>

  <!-- Subtle hex grid pattern -->
  <g stroke="#21262d" stroke-width="0.5" fill="none" opacity="0.5">
    <path d="M120,60 L150,40 L180,60 L180,95 L150,115 L120,95Z"/>
    <path d="M220,60 L250,40 L280,60 L280,95 L250,115 L220,95Z"/>
    <path d="M170,120 L200,100 L230,120 L230,155 L200,175 L170,155Z"/>
    <path d="M70,120 L100,100 L130,120 L130,155 L100,175 L70,155Z"/>
    <path d="M270,120 L300,100 L330,120 L330,155 L300,175 L270,155Z"/>
  </g>

  <!-- Wallet icon -->
  <g transform="translate(200,175)">
    <!-- Wallet body -->
    <rect x="-70" y="-50" width="140" height="100" rx="12" ry="12" fill="none" stroke="url(#accent)" stroke-width="5"/>

    <!-- Wallet flap -->
    <path d="M-70,-50 L-70,-65 C-70,-75 -60,-85 -50,-85 L50,-85 C55,-85 58,-80 55,-75 L50,-50" fill="none" stroke="#58a6ff" stroke-width="4" stroke-linecap="round"/>

    <!-- Card slot / clasp -->
    <rect x="40" y="-12" width="35" height="24" rx="6" fill="#161b22" stroke="url(#accent)" stroke-width="3"/>
    <circle cx="52" cy="0" r="5" fill="#3fb950"/>

    <!-- Chain links inside wallet -->
    <g stroke="#58a6ff" stroke-width="2" opacity="0.5">
      <circle cx="-30" cy="-10" r="10" fill="none"/>
      <circle cx="-10" cy="-10" r="10" fill="none"/>
      <circle cx="-20" cy="15" r="10" fill="none"/>
      <circle cx="0" cy="15" r="10" fill="none"/>
    </g>

    <!-- AI sparkle -->
    <g fill="#58a6ff">
      <path d="M-55,-75 L-52,-68 L-48,-75 L-52,-82Z" opacity="0.8"/>
      <path d="M65,-60 L68,-52 L72,-60 L68,-68Z" opacity="0.6"/>
    </g>
  </g>

  <!-- Text -->
  <text x="200" y="320" text-anchor="middle" fill="#58a6ff" font-family="system-ui,-apple-system,sans-serif" font-size="34" font-weight="700" letter-spacing="1">AgentWallet</text>
  <text x="200" y="352" text-anchor="middle" fill="#8b949e" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="400" letter-spacing="2">AI-NATIVE CRYPTO</text>
</svg>
